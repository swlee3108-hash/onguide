<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>톤즈 가이드</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard Variable',Pretendard,-apple-system,system-ui,sans-serif;background:#F9F6F0;overflow:hidden;user-select:none}
#canvas{display:block;cursor:grab}
.tooltip{position:fixed;background:#252220;border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:10px 14px;font-size:13px;color:#F0EBE3;max-width:340px;pointer-events:none;z-index:1000;opacity:0;transition:opacity .2s;line-height:1.6;box-shadow:0 8px 30px rgba(0,0,0,.6)}
.tooltip.show{opacity:1}
.tooltip b{font-size:14px;display:block;margin-bottom:4px}
.tooltip .t{display:inline-block;padding:1px 7px;border-radius:99px;font-size:11px;margin-right:4px;font-weight:600}
.tooltip .who-box{margin-top:7px;padding:6px 9px;background:rgba(192,139,92,.1);border-left:3px solid #C08B5C;border-radius:0 6px 6px 0;font-size:11.5px;color:#E8D5C4;line-height:1.6}
.tooltip .who-label{font-size:10px;font-weight:700;color:#C08B5C;letter-spacing:.5px;margin-bottom:2px;display:block}
.tabs{display:flex;justify-content:center;gap:6px;padding:10px;position:sticky;top:0;z-index:50;background:#F9F6F0}
.theme-light .tabs{background:#F9F6F0}
.tabs button{padding:6px 18px;border:1px solid #E8E3DC;border-radius:99px;background:none;color:#8A7E72;font-size:13px;font-family:inherit;cursor:pointer;transition:.2s}
.tabs button.on{background:#C08B5C;color:#FFFFFF;border-color:#C08B5C;font-weight:700}
.panel{display:none}.panel.on{display:block}
#search-box{position:fixed;top:12px;right:16px;z-index:200;display:flex;align-items:center;gap:6px}
#search-input{background:#FFFFFF;border:1px solid #E8E3DC;border-radius:99px;padding:6px 14px 6px 36px;color:#2D2A26;font-size:13px;font-family:inherit;outline:none;width:200px;transition:.2s}
#search-input:focus{border-color:#C08B5C;width:260px;box-shadow:0 0 0 2px rgba(192,139,92,.2)}
#search-input::placeholder{color:#B0A89E}
#search-icon{position:absolute;left:26px;top:50%;transform:translateY(-50%);color:#6a6560;font-size:14px;pointer-events:none}
#search-results{position:fixed;top:48px;right:16px;z-index:200;background:#FFFFFF;border:1px solid #E8E3DC;border-radius:10px;max-width:300px;width:300px;max-height:340px;overflow-y:auto;box-shadow:0 4px 16px rgba(45,42,38,0.10);display:none}
#search-results.show{display:block}
.sr-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid #F0EBE3;transition:.15s}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:rgba(192,139,92,.08)}
.sr-item .sr-name{font-size:13px;color:#2D2A26;font-weight:600}
.sr-item .sr-path{font-size:11px;color:#8A7E72;margin-top:2px}
.sr-item .sr-hl{color:#C08B5C}
.sr-empty{padding:14px;color:#8A7E72;font-size:13px;text-align:center}
#tm-wrap{position:relative;margin:0 auto;max-width:1200px;padding:12px}
.tm-cell{position:absolute;overflow:hidden;border:1px solid rgba(0,0,0,.4);border-radius:6px;cursor:pointer;transition:all .25s;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:4px}
.tm-cell:hover{z-index:10;filter:brightness(1.25);transform:scale(1.02)}
.tm-cell .lb{font-weight:600;font-size:clamp(9px,1.2vw,13px);color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.6);line-height:1.3}
.tm-cell .sb{font-size:clamp(8px,.9vw,11px);opacity:.8;color:rgba(255,255,255,.85);margin-top:2px}
.legend{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:6px}
.legend span{display:flex;align-items:center;gap:4px;font-size:11px;color:#8A7E72}
.legend i{width:10px;height:10px;border-radius:3px;display:inline-block}
.zoom-hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(27,27,36,.9);border:1px solid rgba(255,255,255,.08);border-radius:99px;padding:6px 16px;font-size:11px;color:#8A7E72;z-index:50;pointer-events:none;transition:opacity .4s}
.zoom-hint.hide{opacity:0}
.back-btn{position:fixed;top:52px;left:14px;background:#7B3B2B;color:#FFFFFF;border:none;border-radius:99px;padding:6px 14px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;z-index:60;display:none;transition:opacity .3s;box-shadow:0 2px 8px rgba(45,42,38,.15)}
.back-btn.show{display:block}
.back-btn:hover{filter:brightness(1.15)}
.theme-light{background:#F9F6F0!important}
.theme-light .tooltip{background:#FFFFFF;border-color:#E8E3DC;color:#4A4540}
.theme-light .tooltip b{color:#2D2A26}
.theme-light .who-box{background:rgba(192,139,92,.08);color:#7B3B2B}
#themeBtn{position:fixed;bottom:16px;right:16px;z-index:200;padding:6px 14px;border:1px solid #E8E3DC;border-radius:99px;background:#FFFFFF;color:#8A7E72;font-size:12px;font-family:inherit;cursor:pointer;transition:.2s}
#themeBtn:hover{background:#F0EBE3;color:#4A4540}
#navPanel{position:fixed;left:12px;top:50%;transform:translateY(-50%);z-index:100;display:flex;flex-direction:column;gap:4px}
#navPanel button{padding:6px 10px;border:1px solid rgba(255,255,255,.1);border-radius:8px;background:rgba(27,27,36,.85);color:#B0A89E;font-size:11px;font-family:inherit;cursor:pointer;text-align:left;transition:.2s;white-space:nowrap;backdrop-filter:blur(8px)}
#navPanel button:hover{background:rgba(192,139,92,.2);color:#F0EBE3;border-color:rgba(192,139,92,.4)}
#navPanel button.active{background:rgba(192,139,92,.25);color:#C08B5C;border-color:#C08B5C}
.theme-light #navPanel button{background:rgba(255,255,255,.85);color:#6A6560;border-color:#E8E3DC}
.theme-light #navPanel button:hover{background:rgba(192,139,92,.15);color:#4A4540}
.theme-light #navPanel button.active{color:#7B3B2B;border-color:#C08B5C}
#flow-wrap{display:flex;gap:0;padding:20px 0;height:calc(100vh - 54px);overflow-x:auto;align-items:stretch;justify-content:center}
.flow-col{flex-shrink:0;overflow-y:auto;padding:12px 10px;display:flex;flex-direction:column;gap:4px;border-right:1px solid rgba(255,255,255,.04)}
.flow-col:last-child{border-right:none}
.flow-col.col-cat{width:220px}
.flow-col.col-sub{width:260px}
.flow-col.col-tier{width:320px}
.flow-col.col-prog{width:380px}
.flow-col-header{font-size:13px;font-weight:700;color:#8A7E72;text-transform:uppercase;letter-spacing:.5px;padding:8px 12px;margin-bottom:6px;white-space:nowrap}
.flow-item{padding:14px 16px;border-radius:10px;cursor:pointer;font-size:15px;color:#B0A89E;transition:.15s;border-left:4px solid transparent}
.flow-item:hover{background:rgba(255,255,255,.04);color:#F0EBE3}
.flow-item.selected{background:rgba(192,139,92,.12);border-left-color:#C08B5C;color:#C08B5C;font-weight:600}
.flow-item .fi-name{font-weight:600;margin-bottom:3px;font-size:15px}
.flow-item .fi-desc{font-size:13px;color:#6a6560;line-height:1.5}
.flow-item .fi-count{font-size:12px;color:#6A6560;margin-top:3px}
.flow-item.fi-tier{border-left-width:5px}
.flow-item.fi-tier .fi-rank{display:inline-flex;width:24px;height:24px;border-radius:50%;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;margin-right:8px;flex-shrink:0}
.flow-item.fi-program{border-left-color:#D4A030;padding:12px 16px}
.flow-item.fi-program .fi-name{font-size:14px}
.theme-light .flow-item{color:#8A7E72}
.theme-light .flow-item:hover{background:rgba(0,0,0,.03);color:#4A4540}
.theme-light .flow-item.selected{background:rgba(192,139,92,.08);color:#7B3B2B}
.theme-light .flow-col{border-right-color:rgba(0,0,0,.06)}
.flow-card{background:#252220;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px 18px;cursor:pointer;transition:.25s;position:relative;overflow:hidden}
.flow-card:hover{border-color:rgba(192,139,92,.5);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.flow-card .fc-icon{font-size:24px;margin-bottom:8px}
.flow-card .fc-title{font-size:15px;font-weight:700;color:#F0EBE3;margin-bottom:4px}
.flow-card .fc-desc{font-size:12px;color:#8A7E72;line-height:1.5}
.flow-card .fc-count{position:absolute;top:14px;right:16px;font-size:11px;color:#6a6560;background:rgba(255,255,255,.06);padding:2px 8px;border-radius:99px}
.flow-card .fc-badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;margin-top:8px;margin-right:4px}
.flow-card .fc-who{margin-top:10px;padding:8px 10px;background:rgba(192,139,92,.08);border-left:3px solid #C08B5C;border-radius:0 8px 8px 0;font-size:11px;color:#D4B896;line-height:1.5}
.flow-card .fc-arrow{position:absolute;bottom:12px;right:14px;color:#C08B5C;font-size:16px;opacity:.5;transition:.2s}
.flow-card:hover .fc-arrow{opacity:1;transform:translateX(3px)}
.flow-card.fc-proc{border-left:3px solid}
.flow-card.fc-proc .fc-arrow{display:none}
.theme-light .flow-card{background:#FFFFFF;border-color:#E8E3DC}
.theme-light .flow-card:hover{border-color:#C08B5C;box-shadow:0 8px 24px rgba(0,0,0,.08)}
.theme-light .flow-card .fc-title{color:#2D2A26}
.theme-light .flow-card .fc-desc{color:#8A7E72}
.theme-light .flow-card .fc-who{background:rgba(192,139,92,.06);color:#7B3B2B}
.theme-light #flow-breadcrumb{color:#B0A89E}
.flow-card.combo-highlight{border:2px solid #D4A030!important;background:linear-gradient(135deg,rgba(212,160,48,0.08),rgba(212,160,48,0.02))!important}
.tier-step{display:flex;align-items:stretch;gap:0;position:relative;margin-bottom:2px}
.tier-step .tier-rank{width:40px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.tier-step .tier-rank .rank-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;z-index:2}
.tier-step .tier-rank .rank-line{position:absolute;left:50%;top:28px;bottom:0;width:2px;transform:translateX(-50%)}
.tier-step:last-child .rank-line{display:none}
.tier-step .tier-body{flex:1;background:#252220;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 16px;cursor:pointer;transition:.25s}
.tier-step .tier-body:hover{border-color:rgba(192,139,92,.4);transform:translateX(4px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.tier-step .tier-body .tier-name{font-size:14px;font-weight:700;color:#F0EBE3}
.tier-step .tier-body .tier-tag{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;margin-left:8px}
.tier-step .tier-body .tier-desc{font-size:12px;color:#8A7E72;margin-top:4px}
.tier-step .tier-body .tier-programs{font-size:11px;color:#6a6560;margin-top:6px}
.tier-step.tier-addon{opacity:.6}
.tier-step.tier-addon .tier-body{border-style:dashed}
.theme-light .tier-step .tier-body{background:#FFFFFF;border-color:#E8E3DC}
.theme-light .tier-step .tier-body:hover{border-color:#C08B5C}
.theme-light .tier-step .tier-body .tier-name{color:#2D2A26}
.theme-light .tier-step .tier-body .tier-desc{color:#8A7E72}
#pkgToggle{display:none}
#pkgPanel{position:fixed;left:0;top:46px;z-index:190;width:min(260px,20vw);max-height:calc(100vh - 46px);height:auto;overflow-y:auto;background:rgba(255,255,255,.95);border-right:1px solid #E8E3DC;padding:10px 10px;backdrop-filter:blur(12px);box-shadow:2px 0 8px rgba(45,42,38,.08);cursor:default}
#pkgPanel .pkg-drag-handle{cursor:grab;padding:3px 8px;margin:-4px -10px 6px;border-bottom:1px solid #E8E3DC;font-size:10px;color:#B0A89E;text-align:left;user-select:none}
.pkg-cat{padding:4px 0;margin-bottom:4px}
.pkg-cat-header{font-size:11px;font-weight:700;color:#A0623A;text-transform:uppercase;letter-spacing:.5px;padding:6px 8px;cursor:pointer;display:flex;align-items:center;gap:6px}
.pkg-cat-header:hover{color:#C08B5C}
.pkg-cat-body{display:none;padding-left:4px}
.pkg-cat.open .pkg-cat-body{display:block}
.pkg-cat.open .pkg-cat-header{color:#C08B5C}
.pkg-item{padding:7px 10px;border-radius:8px;cursor:pointer;transition:.15s;font-size:12px;color:#4A4540;border-left:2px solid transparent;margin-bottom:2px}
.pkg-item:hover{background:rgba(192,139,92,.06);color:#2D2A26}
.pkg-item.active{background:rgba(212,160,48,.10);border-left-color:#D4A030;color:#A0623A}
.pkg-item .pkg-name{font-weight:600}
.pkg-item .pkg-desc{font-size:10px;color:#6a6560;margin-top:2px}
.pkg-item .pkg-components{display:none;margin-top:6px;padding:6px 8px;background:rgba(255,255,255,.03);border-radius:6px;font-size:10px;color:#8A7E72;line-height:1.6}
.pkg-item.active .pkg-components{display:block}
.theme-light #pkgToggle{background:rgba(255,255,255,.9);color:#6A6560;border-color:#E8E3DC}
.theme-light #pkgPanel{background:rgba(248,246,243,.95);border-left-color:#E8E3DC}
.theme-light .pkg-item{color:#8A7E72}
.theme-light .pkg-item:hover{background:rgba(0,0,0,.03);color:#4A4540}
.theme-light .pkg-item.active{background:rgba(212,160,48,.06);color:#A0623A}
#nodeOverlay{position:fixed;left:0;top:0;width:100%;height:100%;z-index:500;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.5);backdrop-filter:blur(4px)}
#nodeOverlay.show{display:flex}
#nodeCard{background:#252220;border:1px solid rgba(255,255,255,.1);border-radius:18px;width:min(520px,90vw);max-height:80vh;overflow-y:auto;padding:24px 28px;box-shadow:0 16px 48px rgba(0,0,0,.5);position:relative}
#nodeCard .nc-close{position:absolute;top:14px;right:16px;width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,.1);background:none;color:#8A7E72;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
#nodeCard .nc-close:hover{background:rgba(255,255,255,.08);color:#fff}
#nodeCard .nc-title{font-size:18px;font-weight:700;color:#F0EBE3;margin-bottom:4px;padding-right:36px}
#nodeCard .nc-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
#nodeCard .nc-tag{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600}
#nodeCard .nc-body{font-size:13px;color:#b0a89e;line-height:1.7;margin-bottom:12px}
#nodeCard .nc-section{margin-top:10px;padding:10px 12px;border-radius:10px;font-size:12px;line-height:1.6}
#nodeCard .nc-section-label{font-size:10px;font-weight:700;display:block;margin-bottom:3px}
#nodeCard .nc-dur{background:rgba(160,98,58,.1);border-left:3px solid #A0623A;color:#D4B896}
#nodeCard .nc-dur .nc-section-label{color:#A0623A}
#nodeCard .nc-note{background:rgba(192,80,48,.08);border-left:3px solid #C05030;color:#E8C4A8}
#nodeCard .nc-note .nc-section-label{color:#C05030}
#nodeCard .nc-eff{background:rgba(192,139,92,.08);border-left:3px solid #C08B5C;color:#D4B896}
#nodeCard .nc-who{background:rgba(192,139,92,.06);border-left:3px solid #C08B5C;border-radius:0 10px 10px 0;color:#D4B896}
#nodeCard .nc-who .nc-section-label{color:#C08B5C}
.nc-photos{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
.nc-photos .nc-thumb{width:120px;height:80px;border-radius:8px;object-fit:cover;cursor:pointer;border:1px solid rgba(255,255,255,.1);transition:.2s}
.nc-photos .nc-thumb:hover{border-color:#C08B5C;transform:scale(1.03)}
.nc-photos .nc-photo-label{font-size:10px;color:#6a6560;margin-top:2px;text-align:center}
.fi-photos{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.fi-photos .fi-thumb{width:80px;height:54px;border-radius:6px;object-fit:cover;cursor:pointer;border:1px solid rgba(255,255,255,.08);transition:.2s}
.fi-photos .fi-thumb:hover{border-color:#C08B5C;transform:scale(1.05)}
#photoPopup{position:fixed;left:0;top:0;width:100%;height:100%;z-index:2000;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.85);cursor:pointer;backdrop-filter:blur(8px)}
#photoPopup.show{display:flex}
#photoPopup img{max-width:92vw;max-height:88vh;border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6)}
#photoPopup .pp-close{position:fixed;top:20px;right:24px;color:#fff;font-size:28px;cursor:pointer;z-index:2001;opacity:.7;transition:.2s}
#photoPopup .pp-close:hover{opacity:1}
.theme-light #nodeCard{background:#FFFFFF;border-color:#E8E3DC}
.theme-light #nodeCard .nc-title{color:#2D2A26}
.theme-light #nodeCard .nc-body{color:#6A6560}
.theme-light #nodeCard .nc-who{background:rgba(192,139,92,.05);color:#7B3B2B}
#cg-philosophy{padding:64px 40px;max-width:960px;margin:0 auto}
.cg-hero{text-align:center;margin-bottom:48px}
.cg-hero-title{font-size:36px;font-weight:800;letter-spacing:-0.03em;line-height:1.2;color:#2D2A26}
.cg-hero-sub{font-size:14px;color:#8A7E72;margin-top:8px}
.cg-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-bottom:40px}
.cg-card{background:#FFFFFF;border:1px solid #E8E3DC;border-radius:14px;padding:32px 24px;box-shadow:0 1px 2px rgba(45,42,38,0.06);transition:all 200ms cubic-bezier(0.25,0.1,0.25,1)}
.cg-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(45,42,38,0.10)}
.cg-card-num{font-size:11px;font-weight:700;letter-spacing:0.08em;color:#A0623A;margin-bottom:12px}
.cg-card-title{font-size:22px;font-weight:700;letter-spacing:-0.015em;color:#2D2A26;margin-bottom:4px}
.cg-card-accent{font-size:14px;font-weight:500;color:#C08B5C;margin-bottom:12px}
.cg-card-body{font-size:14px;color:#4A4540;line-height:1.7}
.cg-card-tags{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.cg-card-tag{font-size:11px;font-weight:500;color:#8A7E72;background:#F0EBE3;padding:4px 10px;border-radius:4px}
.cg-cta{text-align:center}
.cg-cta-btn{display:inline-flex;align-items:center;height:48px;padding:0 32px;background:#E87A00;color:#FFFFFF;border:none;border-radius:10px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;letter-spacing:-0.005em;transition:all 200ms;box-shadow:0 2px 8px rgba(232,122,0,0.25)}
.cg-cta-btn:hover{background:#D06E00;transform:translateY(-1px);box-shadow:0 4px 16px rgba(232,122,0,0.3)}
#cg-chat{padding:40px;max-width:720px;margin:0 auto;min-height:80vh}
.cg-chat-header{text-align:center;margin-bottom:32px}
.cg-chat-label{font-size:10px;font-weight:700;letter-spacing:0.08em;color:#C08B5C}
.cg-chat-title{font-size:22px;font-weight:700;letter-spacing:-0.015em;color:#2D2A26;margin-top:4px}
.cg-chat-sub{font-size:12px;color:#8A7E72;margin-top:4px}
.cg-messages{display:flex;flex-direction:column;gap:12px;margin-bottom:24px;min-height:200px}
.cg-msg{max-width:75%;padding:14px 18px;font-size:14px;line-height:1.65;animation:cgFadeIn 300ms ease}
.cg-msg-sys{align-self:flex-start;background:#F0EBE3;color:#4A4540;border-radius:20px 20px 20px 4px}
.cg-msg-user{align-self:flex-end;background:#E87A00;color:#FFFFFF;border-radius:20px 20px 4px 20px}
.cg-msg-loading{align-self:flex-start;background:#F0EBE3;color:#8A7E72;border-radius:20px 20px 20px 4px;padding:14px 24px}
@keyframes cgFadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.cg-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.cg-chip{padding:8px 16px;background:#FFFFFF;border:1px solid #E8E3DC;border-radius:9999px;font-size:13px;font-weight:500;color:#4A4540;cursor:pointer;transition:all 200ms;font-family:inherit}
.cg-chip:hover{border-color:#C08B5C;color:#A0623A;background:rgba(192,139,92,0.06)}
.cg-chip:active{background:rgba(192,139,92,0.12)}
.cg-programs{display:flex;flex-direction:column;gap:8px;margin-top:12px;max-width:75%}

var tip=document.getElementById('tip');
var backBtn=document.getElementById('backBtn');
var zoomHint=document.getElementById('zoomHint');
function showT(e,h){tip.innerHTML=h;tip.classList.add('show');moveT(e)}
function moveT(e){var x=e.clientX+14,y=e.clientY+14;if(x+310>innerWidth)x=e.clientX-310;if(y+180>innerHeight)y=e.clientY-180;tip.style.left=x+'px';tip.style.top=y+'px'}
function hideT(){tip.classList.remove('show')}

function sw(n){
  document.querySelectorAll('.tabs button').forEach(function(b,i){b.className=i===n?'on':''});
  document.querySelectorAll('.panel').forEach(function(p,i){p.className=i===n?'panel on':'panel'});
  if(n===0){zoomHint.classList.remove('hide')}else{zoomHint.classList.add('hide')}
  var np=document.getElementById('navPanel');if(np)np.style.display=n===0?'flex':'none';
  if(n===0&&!needsMode){showPkgPanel()}else{hidePkgPanel()}
  if(n===1){drawFlow()}
  if(n===2) initCustomerGuide();
}

// Build package name set for filtering
var pkgNameSet=new Set();
packageDefs.forEach(function(cat){cat.items.forEach(function(pkg){pkgNameSet.add(pkg.name)})});

// Needs view state
var needsMode=false;
var needsLayoutNodes=[];

// ========== CANVAS + ZOOM STATE ==========
var cv=document.getElementById('canvas');
var ctx=cv.getContext('2d');
var W,H,CX,CY,DPR,nodes=[];
var highlightedNames=new Set();

// Zoom/pan state
var zoom={scale:1,tx:0,ty:0,target:{scale:1,tx:0,ty:0},animating:false,focused:null};
var INIT_SCALE=0.32; // 초기 축소 비율

function initCanvas(){
  DPR=window.devicePixelRatio||1;
  // 캔버스 = 뷰포트에 맞춤 (클릭 영역이 뷰포트 밖으로 나가지 않도록)
  W=innerWidth;
  H=innerHeight-50;
  cv.width=W*DPR;cv.height=H*DPR;
  cv.style.width=W+'px';cv.style.height=H+'px';
  // 노드 좌표 중심 — 넓은 월드 공간 (축소 줌으로 전체 표시)
  CX=800;CY=600;
}

function hex2rgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}

function drawCurve(x1,y1,x2,y2,color,w){
  ctx.beginPath();
  var cx1=x1+(x2-x1)*.5-(y2-y1)*.1;
  var cy1=y1+(y2-y1)*.5+(x2-x1)*.1;
  ctx.moveTo(x1,y1);ctx.quadraticCurveTo(cx1,cy1,x2,y2);
  ctx.strokeStyle=color;ctx.lineWidth=w;ctx.stroke();
}

function roundRectPath(c,x,y,w,h,r){
  c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();
}
function fillRR(c,x,y,w,h,r,fill){c.beginPath();roundRectPath(c,x,y,w,h,r);c.fillStyle=fill;c.fill()}

function wrapTxt(text,maxW){
  var lines=[],line='';
  for(var i=0;i<text.length;i++){
    var test=line+text[i];
    if(ctx.measureText(test).width>maxW&&line.length>0){lines.push(line);line=text[i]}
    else line=test;
  }
  if(line)lines.push(line);return lines;
}

// ========== COLLISION RESOLUTION ==========
// Each layoutNode has: {x, y, hw, hh, type, parentX, parentY, ...data}
var layoutNodes=[];

function resolveCollisions(nodeList, iterations){
  var pad=52;
  for(var iter=0;iter<iterations;iter++){
    var moved=false;
    for(var i=0;i<nodeList.length;i++){
      for(var j=i+1;j<nodeList.length;j++){
        var a=nodeList[i],b=nodeList[j];
        var overlapX=(a.hw+b.hw+pad)-(Math.abs(a.x-b.x));
        var overlapY=(a.hh+b.hh+pad)-(Math.abs(a.y-b.y));
        if(overlapX>0&&overlapY>0){
          var dx=b.x-a.x||0.1, dy=b.y-a.y||0.1;
          var dist=Math.sqrt(dx*dx+dy*dy);
          // 겹침량에 비례한 방사형 밀어내기
          var push=Math.sqrt(overlapX*overlapX+overlapY*overlapY)*0.6;
          var pushX=(dx/dist)*push;
          var pushY=(dy/dist)*push;
          var aWeight=a.type==='journey'?0.0:a.type==='sub'?0.2:0.6;
          var bWeight=b.type==='journey'?0.0:b.type==='sub'?0.2:0.6;
          a.x-=pushX*aWeight; a.y-=pushY*aWeight;
          b.x+=pushX*bWeight; b.y+=pushY*bWeight;
          moved=true;
        }
      }
    }
    if(!moved)break;
  }
}

// Update parentX/parentY after collision resolution
function updateParentRefs(nodeList){
  // Build index: find parent for each node by hierarchy
  for(var i=0;i<nodeList.length;i++){
    var nd=nodeList[i];
    if(nd.type==='journey')continue; // root, no parent to update (parent=center)
    // Find parent node
    var parent=null;
    for(var j=0;j<nodeList.length;j++){
      var p=nodeList[j];
      if(p===nd)continue;
      if(nd.type==='sub'&&p.type==='journey'&&p.ji===nd.ji){parent=p;break;}
      if(nd.type==='sub2'&&p.type==='sub'&&p.ji===nd.ji&&p.si===nd.si){parent=p;break;}
      if(nd.type==='leaf'&&nd.gi!==undefined&&p.type==='sub2'&&p.ji===nd.ji&&p.si===nd.si&&p.li===nd.gi){parent=p;break;}
      if(nd.type==='leaf'&&nd.gi===undefined&&p.type==='sub'&&p.ji===nd.ji&&p.si===nd.si){parent=p;break;}
      if(nd.type==='brand'&&p.type==='sub2'&&p.ji===nd.ji&&p.si===nd.si&&p.li===nd.li){parent=p;break;}
    }
    if(parent){nd.parentX=parent.x;nd.parentY=parent.y;}
  }
}

// ========== LAYOUT (compute positions) ==========
function computeLayout(){
  layoutNodes=[];
  ctx.save();
  // We need ctx for measureText, set a base transform
  ctx.setTransform(DPR,0,0,DPR,0,0);

  var js=tree.j;
  // journey 노드 배치 각도 — 4분면에 균등 배분
  var baseAngles=[-Math.PI*0.70, -Math.PI*0.30, Math.PI*0.30, Math.PI*0.70];

  for(var ji=0;ji<js.length;ji++){
    var j=js[ji],jAngle=baseAngles[ji],jColor=JC[ji];
    var jR=520;
    var jx=CX+Math.cos(jAngle)*jR,jy=CY+Math.sin(jAngle)*jR;

    ctx.font='bold 14px "Pretendard Variable",Pretendard,-apple-system,system-ui';
    var jbw=Math.max(ctx.measureText(j.name).width+32,100),jbh=34;
    layoutNodes.push({x:jx,y:jy,hw:jbw/2,hh:jbh/2,type:'journey',
      name:j.name,color:jColor,ji:ji,parentX:CX,parentY:CY,bw:jbw,bh:jbh});

    var subs=j.subs;
    var subSpread=subs.length<=2?1.00:subs.length<=4?0.90:subs.length<=6?0.82:0.72;
    // 각 journey의 좌우 경계 각도 계산 (인접 journey 중간점)
    var prevAngle = ji>0 ? baseAngles[ji-1] : baseAngles[0]-Math.PI;
    var nextAngle = ji<3 ? baseAngles[ji+1] : baseAngles[3]+Math.PI;
    var boundaryMin = (jAngle+prevAngle)/2 + 0.10;
    var boundaryMax = (jAngle+nextAngle)/2 - 0.10;
    var subStart=jAngle-subSpread*(subs.length-1)/2;

    for(var si=0;si<subs.length;si++){
      var sub=subs[si];
      // 서브 각도를 이 journey 영역 안으로 clamp
      var sAngle=Math.max(boundaryMin, Math.min(boundaryMax, subStart+si*subSpread));
      var sR=380;
      var sx=jx+Math.cos(sAngle)*sR,sy=jy+Math.sin(sAngle)*sR;

      ctx.font='600 11px "Pretendard Variable",Pretendard,-apple-system,system-ui';
      var sw2=Math.max(ctx.measureText(sub.name).width+20,75),sh2=26;
      layoutNodes.push({x:sx,y:sy,hw:sw2/2,hh:sh2/2,type:'sub',
        name:sub.name,brandInfo:sub.brandInfo,color:jColor,ji:ji,si:si,parentX:jx,parentY:jy,bw:sw2,bh:sh2});

      var items=sub.items;
      var leafSpread=items.length<=3?0.64:items.length<=5?0.58:items.length<=8?0.52:0.44;
      var leafStart=sAngle-leafSpread*(items.length-1)/2;

      for(var li=0;li<items.length;li++){
        var leaf=items[li];
        if(pkgNameSet.has(leaf.n))continue;
        // 리프 각도도 journey 영역 안으로 clamp
        var lAngle=Math.max(boundaryMin, Math.min(boundaryMax, leafStart+li*leafSpread));
        var lR=360+(li%3)*55;
        var lx=sx+Math.cos(lAngle)*lR,ly=sy+Math.sin(lAngle)*lR;

        if(leaf.brands){
          // sub2 중간노드 (예: 주름톡신, 사각턱보톡스)
          ctx.font='600 10px "Pretendard Variable",Pretendard,-apple-system,system-ui';
          var s2bw=Math.max(ctx.measureText(leaf.n).width+22,80),s2bh=26;
          layoutNodes.push({x:lx,y:ly,hw:s2bw/2,hh:s2bh/2,type:'sub2',
            name:leaf.n,tip:leaf.tip,cat:leaf.c,lv:leaf.l,v:leaf.v,
            color:CC[leaf.c]||'#B0A89E',ji:ji,si:si,li:li,
            parentX:sx,parentY:sy,bw:s2bw,bh:s2bh});

          var brands=leaf.brands;
          var bSpread=brands.length<=3?0.66:brands.length<=6?0.58:0.50;
          var bStart=lAngle-bSpread*(brands.length-1)/2;
          for(var bi=0;bi<brands.length;bi++){
            var br=brands[bi],bAngle=bStart+bi*bSpread;
            var bR=270;
            var bx=lx+Math.cos(bAngle)*bR,by=ly+Math.sin(bAngle)*bR;
            ctx.font='400 9px "Pretendard Variable",Pretendard,-apple-system,system-ui';
            var btw=ctx.measureText(br.n).width;
            var btextLines=Math.ceil(btw/70);
            var bHW=Math.min(btw,70)/2+4;
            var bdotR=Math.max(3,br.v/5);
            var bHH=bdotR+4+btextLines*12;
            layoutNodes.push({x:bx,y:by+bHH/2-bdotR,hw:bHW,hh:bHH/2+2,type:'brand',
              name:br.n,tip:br.t,who:br.w,note:br.note,dur:br.dur,cat:br.c,lv:br.l,v:br.v,
              color:CC[br.c]||'#C05030',ji:ji,si:si,li:li,bi:bi,
              parentX:lx,parentY:ly,dotR:bdotR,textLines:btextLines});
          }
        } else {
          ctx.font='400 9.5px "Pretendard Variable",Pretendard,-apple-system,system-ui';
          var tw=ctx.measureText(leaf.n).width;
          var textLines=Math.ceil(tw/75);
          var leafHW=Math.min(tw,75)/2+4;
          var dotR=Math.max(3.5,leaf.v/4.5);
          var leafHH=dotR+4+textLines*12;
          layoutNodes.push({x:lx,y:ly+leafHH/2-dotR,hw:leafHW,hh:leafHH/2+2,type:'leaf',
            name:leaf.n,tip:leaf.t,who:leaf.w,eff:leaf.eff,cat:leaf.c,lv:leaf.l,v:leaf.v,
            color:CC[leaf.c]||'#8A7E72',ji:ji,si:si,li:li,
            parentX:sx,parentY:sy,dotR:dotR,textLines:textLines});
        }
      }
    }
  }
  ctx.restore();

  // Run collision resolution — 30 iterations usually enough
  resolveCollisions(layoutNodes, 600);
  updateParentRefs(layoutNodes);
}

// ========== DRAW (render from layoutNodes) ==========
function draw(){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  // Clear with appropriate background — 캔버스 CSS 크기 기준
  var clearW=cv.width/DPR, clearH=cv.height/DPR;
  if(lightTheme){ctx.fillStyle='#F9F6F0';ctx.fillRect(0,0,clearW,clearH)}
  else{ctx.clearRect(0,0,clearW,clearH)}
  ctx.setTransform(DPR*zoom.scale,0,0,DPR*zoom.scale,DPR*zoom.tx,DPR*zoom.ty);
  nodes=[];
  var activeNodes=needsMode?needsLayoutNodes:layoutNodes;

  // Subtle radial grid
  ctx.globalAlpha=.04;
  [150,300,450,600].forEach(function(r){ctx.beginPath();ctx.arc(CX,CY,r,0,Math.PI*2);ctx.strokeStyle='#F0EBE3';ctx.lineWidth=1/zoom.scale;ctx.stroke()});
  ctx.globalAlpha=1;

  // Render from layoutNodes
  // Pass 1: curves (behind everything)
  var pkgFilter0=activePkg&&highlightedNames.size>0;
  for(var i=0;i<activeNodes.length;i++){
    var nd=activeNodes[i],rgb=hex2rgb(nd.color);
    if(pkgFilter0&&(nd.type==='leaf'||nd.type==='brand')&&!highlightedNames.has(nd.name)){ctx.globalAlpha=0.03}else{ctx.globalAlpha=1}
    if(nd.type==='journey'){
      drawCurve(nd.parentX,nd.parentY,nd.x,nd.y,'rgba('+rgb+',0.45)',3.5/zoom.scale);
    }else if(nd.type==='sub'){
      drawCurve(nd.parentX,nd.parentY,nd.x,nd.y,'rgba('+rgb+',0.28)',2.2/zoom.scale);
    }else if(nd.type==='sub2'){
      var lrgb2=hex2rgb(nd.color);
      drawCurve(nd.parentX,nd.parentY,nd.x,nd.y,'rgba('+lrgb2+',0.35)',1.5/zoom.scale);
    }else if(nd.type==='brand'){
      var brgb=hex2rgb(nd.color);
      drawCurve(nd.parentX,nd.parentY,nd.x,nd.y-((nd.hh||12)-nd.dotR),'rgba('+brgb+',0.18)',0.8/zoom.scale);
    }else if(nd.type==='leaf'){
      var lrgb=hex2rgb(nd.color);
      drawCurve(nd.parentX,nd.parentY,nd.x,nd.y-((nd.hh||15)-nd.dotR),'rgba('+lrgb+',0.22)',1/zoom.scale);
    }
  }

  // Pass 2: nodes
  var pkgFilterActive=activePkg&&highlightedNames.size>0;
  for(var i=0;i<activeNodes.length;i++){
    var nd=activeNodes[i],rgb=hex2rgb(nd.color);
    // Dim non-highlighted leaf/brand nodes when package filter is active
    if(pkgFilterActive&&(nd.type==='leaf'||nd.type==='brand')&&!highlightedNames.has(nd.name)){
      ctx.globalAlpha=0.08;
    }else{ctx.globalAlpha=1;}

    if(nd.type==='journey'){
      ctx.font='bold '+Math.max(10,14/Math.sqrt(zoom.scale))+'px "Pretendard Variable",Pretendard,-apple-system,system-ui';
      fillRR(ctx,nd.x-nd.bw/2,nd.y-nd.bh/2,nd.bw,nd.bh,17,nd.color);
      ctx.fillStyle='#F0EBE3';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(nd.name,nd.x,nd.y);
      nodes.push({x:nd.x,y:nd.y,r:nd.bw/2,name:nd.name,isJ:true,color:nd.color,ji:nd.ji});

    }else if(nd.type==='sub'){
      ctx.font='600 '+Math.max(9,11/Math.sqrt(zoom.scale))+'px "Pretendard Variable",Pretendard,-apple-system,system-ui';
      fillRR(ctx,nd.x-nd.bw/2,nd.y-nd.bh/2,nd.bw,nd.bh,13,'rgba('+rgb+',0.18)');
      ctx.beginPath();roundRectPath(ctx,nd.x-nd.bw/2,nd.y-nd.bh/2,nd.bw,nd.bh,13);
      ctx.strokeStyle='rgba('+rgb+',0.45)';ctx.lineWidth=1/zoom.scale;ctx.stroke();
      ctx.fillStyle=nd.color;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(nd.name,nd.x,nd.y);
      nodes.push({x:nd.x,y:nd.y,r:nd.bw/2,name:nd.name,brandInfo:nd.brandInfo,isSub:true,color:nd.color,ji:nd.ji,si:nd.si});

    }else if(nd.type==='sub2'){
      // 중간 그룹 노드 (주름톡신, 사각턱보톡스)
      var s2c=nd.color,s2rgb=hex2rgb(s2c);
      ctx.font='600 '+Math.max(8,10/Math.sqrt(zoom.scale))+'px "Pretendard Variable",Pretendard,-apple-system,system-ui';
      fillRR(ctx,nd.x-nd.bw/2,nd.y-nd.bh/2,nd.bw,nd.bh,10,'rgba('+s2rgb+',0.22)');
      ctx.beginPath();roundRectPath(ctx,nd.x-nd.bw/2,nd.y-nd.bh/2,nd.bw,nd.bh,10);
      ctx.strokeStyle='rgba('+s2rgb+',0.6)';ctx.lineWidth=1/zoom.scale;ctx.stroke();
      ctx.fillStyle=s2c;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(nd.name,nd.x,nd.y);
      nodes.push({x:nd.x,y:nd.y,r:nd.bw/2,name:nd.name,tip:nd.tip,isSub2:true,color:nd.color,
        cat:nd.cat,lv:nd.lv,ji:nd.ji,si:nd.si,li:nd.li});

    }else if(nd.type==='brand'){
      // 브랜드 리프 노드
      var bc=nd.color,brgb2=hex2rgb(bc);
      var bdotR=nd.dotR;
      var bdotY=nd.y-(nd.hh||12)+bdotR;
      var bx2=nd.x;
      // 랭크 뱃지 색
      var rankColors=['#D4A030','#8A7E72','#A0623A','#C08B5C','#C08B5C'];
      var rankIdx={'1순위':0,'2순위':1,'3순위':2,'4순위':3,'5순위':4,'국산':2,'국산프리미엄':1,'수입':0,'수입프리미엄':0};
      var rc=rankColors[rankIdx[nd.lv]||4];
      // 작은 점
      ctx.beginPath();ctx.arc(bx2,bdotY,bdotR,0,Math.PI*2);ctx.fillStyle=bc;ctx.fill();
      ctx.beginPath();ctx.arc(bx2,bdotY,bdotR+2,0,Math.PI*2);ctx.fillStyle='rgba('+brgb2+',0.1)';ctx.fill();
      // 검색 하이라이트
      if(highlightedNames.has(nd.name)){ctx.beginPath();ctx.arc(bx2,bdotY,bdotR+8,0,Math.PI*2);ctx.fillStyle='rgba(255,220,80,0.35)';ctx.fill();ctx.strokeStyle='rgba(255,220,80,0.9)';ctx.lineWidth=2.5;ctx.stroke();}
      // 순위 뱃지 (작은 원형)
      ctx.beginPath();ctx.arc(bx2+bdotR,bdotY-bdotR,4.5/zoom.scale*Math.min(zoom.scale,2),0,Math.PI*2);
      ctx.fillStyle=rc;ctx.fill();
      // 이름 텍스트
      ctx.font='400 '+Math.max(7,9/Math.sqrt(zoom.scale))+'px "Pretendard Variable",Pretendard,-apple-system,system-ui';
      ctx.fillStyle=lightTheme?'#6A6560':'#B0A89E';ctx.textAlign='center';ctx.textBaseline='top';
      var blines=wrapTxt(nd.name,70);
      for(var k=0;k<blines.length;k++)ctx.fillText(blines[k],bx2,bdotY+bdotR+2+k*11);
      nodes.push({x:bx2,y:bdotY,r:35,name:nd.name,tip:nd.tip,who:nd.who,
        note:nd.note,dur:nd.dur,cat:nd.cat,lv:nd.lv,
        color:bc,isBrand:true,hh:bdotR+4+blines.length*11,ji:nd.ji,si:nd.si,bi:nd.bi});

    }else if(nd.type==='leaf'){
      var lc=nd.color,lrgb=hex2rgb(lc);
      var dotR=nd.dotR;
      // Leaf center is offset: nd.y is center of bounding box, dot is at top
      var dotY=nd.y-(nd.hh||15)+dotR;
      var lx=nd.x;

      ctx.beginPath();ctx.arc(lx,dotY,dotR,0,Math.PI*2);ctx.fillStyle=lc;ctx.fill();
      ctx.beginPath();ctx.arc(lx,dotY,dotR+3,0,Math.PI*2);ctx.fillStyle='rgba('+lrgb+',0.12)';ctx.fill();
      // 검색 하이라이트
      if(highlightedNames.has(nd.name)){ctx.beginPath();ctx.arc(lx,dotY,dotR+8,0,Math.PI*2);ctx.fillStyle='rgba(255,220,80,0.35)';ctx.fill();ctx.strokeStyle='rgba(255,220,80,0.9)';ctx.lineWidth=2.5;ctx.stroke();}

      ctx.font='400 '+Math.max(8,9.5/Math.sqrt(zoom.scale))+'px "Pretendard Variable",Pretendard,-apple-system,system-ui';
      ctx.fillStyle=lightTheme?'#6A6560':'#8A7E72';ctx.textAlign='center';ctx.textBaseline='top';
      var lines=wrapTxt(nd.displayName||nd.name,75);
      for(var k=0;k<lines.length;k++)ctx.fillText(lines[k],lx,dotY+dotR+3+k*12);

      nodes.push({x:lx,y:dotY,r:40,name:nd.name,tip:nd.tip,who:nd.who,eff:nd.eff,cat:nd.cat,lv:nd.lv,
        color:lc,isL:true,isNeedsLeaf:!!nd.isNeedsLeaf,hh:dotR+4+lines.length*12,ji:nd.ji,si:nd.si});
    }
  }
  ctx.globalAlpha=1;

  // Center node
  var grad=ctx.createRadialGradient(CX,CY,8,CX,CY,48);
  grad.addColorStop(0,'#C08B5C');grad.addColorStop(1,'#A0623A');
  ctx.shadowColor='rgba(192,139,92,.35)';ctx.shadowBlur=25/zoom.scale;
  ctx.beginPath();ctx.arc(CX,CY,46,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill();
  ctx.shadowBlur=0;
  ctx.font='bold '+Math.max(11,15/Math.sqrt(zoom.scale))+'px "Pretendard Variable",Pretendard,-apple-system,system-ui';
  ctx.fillStyle='#F0EBE3';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('톤즈',CX,CY-9);
  ctx.font='bold '+Math.max(8,11/Math.sqrt(zoom.scale))+'px "Pretendard Variable",Pretendard,-apple-system,system-ui';
  ctx.fillText(needsMode?'고민별 상담':'가이드',CX,CY+9);
  nodes.push({x:CX,y:CY,r:46,name:'톤즈 가이드',isCenter:true});
}

// ========== ZOOM ANIMATION ==========
function animateZoom(){
  var speed=0.12;
  var ds=zoom.target.scale-zoom.scale;
  var dtx=zoom.target.tx-zoom.tx;
  var dty=zoom.target.ty-zoom.ty;

  zoom.scale+=ds*speed;
  zoom.tx+=dtx*speed;
  zoom.ty+=dty*speed;

  if(Math.abs(ds)<0.005&&Math.abs(dtx)<0.5&&Math.abs(dty)<0.5){
    zoom.scale=zoom.target.scale;
    zoom.tx=zoom.target.tx;
    zoom.ty=zoom.target.ty;
    zoom.animating=false;
    draw();
    return;
  }
  draw();
  requestAnimationFrame(animateZoom);
}

function zoomTo(cx,cy,scale){
  zoom.target.scale=scale;
  zoom.target.tx=W/2-cx*scale;
  zoom.target.ty=H/2-cy*scale;
  if(!zoom.animating){zoom.animating=true;animateZoom()}
  backBtn.className=scale>1.05?'back-btn show':'back-btn';
  zoomHint.classList.add('hide');
}

function getInitZoom(s){
  // 월드 중심(CX,CY)이 뷰포트 중심에 오도록 tx/ty 계산
  return{scale:s, tx:W/2-CX*s, ty:H/2-CY*s};
}
function zoomOut(){
  var iz;
  if(needsMode){
    iz=getInitZoom(0.22);
  }else{
    iz=getInitZoom(INIT_SCALE);
  }
  zoom.target.scale=iz.scale;
  zoom.target.tx=iz.tx;
  zoom.target.ty=iz.ty;
  zoom.focused=null;
  if(!zoom.animating){zoom.animating=true;animateZoom()}
  backBtn.className='back-btn';
  document.querySelectorAll('#navPanel button').forEach(function(b){b.classList.remove('active')});
  zoomHint.classList.remove('hide');
}

// ========== SCREEN → WORLD COORDS ==========
function screen2world(sx,sy){
  return{x:(sx-zoom.tx)/zoom.scale, y:(sy-zoom.ty)/zoom.scale};
}

// ========== DRAG/PAN + NODE DRAG STATE ==========
var drag={active:false,startX:0,startY:0,startTx:0,startTy:0,moved:false,
  nodeDrag:false,dragNode:null,dragChildren:[],dragStartWx:0,dragStartWy:0};

function findDescendants(node,arr){
  var ch=[];
  for(var i=0;i<arr.length;i++){
    var nd=arr[i];
    if(nd===node)continue;
    var isChild=false;
    if(node.type==='journey'){
      isChild=nd.ji===node.ji&&nd.type!=='journey';
    }else if(node.type==='sub'){
      isChild=nd.ji===node.ji&&nd.si===node.si&&(nd.type==='sub2'||nd.type==='leaf'||nd.type==='brand');
    }else if(node.type==='sub2'){
      if(nd.type==='brand'&&nd.ji===node.ji&&nd.si===node.si&&nd.li===node.li){
        isChild=true;
      }else if(nd.type==='leaf'&&nd.ji===node.ji&&nd.si===node.si&&nd.gi===node.li){
        isChild=true;
      }
    }
    if(isChild)ch.push(nd);
  }
  return ch;
}
function hitTestLayout(mx,my){
  var a=needsMode?needsLayoutNodes:layoutNodes;
  for(var i=a.length-1;i>=0;i--){
    var nd=a[i];
    if(nd.type==='journey'||nd.type==='sub'||nd.type==='sub2'){
      var bw=nd.bw||80,bh=nd.bh||30;
      if(mx>nd.x-bw/2-5&&mx<nd.x+bw/2+5&&my>nd.y-bh/2-5&&my<nd.y+bh/2+5)return nd;
    }
  }
  return null;
}

// ========== HIT TEST HELPER ==========
function hitTest(mx,my){
  for(var i=nodes.length-1;i>=0;i--){
    var nd=nodes[i];
    if(nd.isCenter){
      var d=Math.sqrt((mx-nd.x)*(mx-nd.x)+(my-nd.y)*(my-nd.y));
      if(d<nd.r)return nd;
    }
    if(nd.isJ){
      var d=Math.sqrt((mx-nd.x)*(mx-nd.x)+(my-nd.y)*(my-nd.y));
      if(d<nd.r+5)return nd;
    }
    if(nd.isSub||nd.isSub2){
      var d=Math.sqrt((mx-nd.x)*(mx-nd.x)+(my-nd.y)*(my-nd.y));
      if(d<nd.r+5)return nd;
    }
    if(nd.isL||nd.isBrand){
      var dx=mx-nd.x,dy=my-nd.y;
      if(Math.abs(dx)<nd.r&&dy>-10&&dy<(nd.hh||30))return nd;
    }
  }
  return null;
}

// ========== MOUSE EVENTS ==========
cv.addEventListener('mousemove',function(e){
  var rect=cv.getBoundingClientRect();
  var sx=e.clientX-rect.left,sy=e.clientY-rect.top;

  // Handle node drag or background pan
  if(drag.active){
    var dx=sx-drag.startX,dy=sy-drag.startY;
    if(Math.abs(dx)>3||Math.abs(dy)>3)drag.moved=true;

    if(drag.nodeDrag&&drag.dragNode){
      // Node drag: move node + children in world coords
      var wNow=screen2world(sx,sy);
      var wdx=wNow.x-drag.dragStartWx;
      var wdy=wNow.y-drag.dragStartWy;
      // Move the dragged node + all children by delta
      drag.dragNode.x+=wdx; drag.dragNode.y+=wdy;
      for(var ci=0;ci<drag.dragChildren.length;ci++){
        drag.dragChildren[ci].x+=wdx;
        drag.dragChildren[ci].y+=wdy;
      }
      // Update all parent references to fix connection lines
      var activeArr=needsMode?needsLayoutNodes:layoutNodes;
      updateParentRefs(activeArr);
      drag.dragStartWx=wNow.x; drag.dragStartWy=wNow.y;
      draw();
      hideT();
      cv.style.cursor='move';
    }else{
      // Background pan
      zoom.tx=drag.startTx+dx;
      zoom.ty=drag.startTy+dy;
      zoom.target.tx=zoom.tx;
      zoom.target.ty=zoom.ty;
      draw();
      hideT();
      cv.style.cursor='grabbing';
    }
    return;
  }

  var w=screen2world(sx,sy);
  var mx=w.x,my=w.y,found=false;

  for(var i=nodes.length-1;i>=0;i--){
    var nd=nodes[i];
    if(nd.isL||nd.isBrand){
      var dx=mx-nd.x,dy=my-nd.y;
      if(Math.abs(dx)<nd.r&&dy>-10&&dy<(nd.hh||30)){
        var lc=nd.color||'#fff';
        var h='<b>'+nd.name+'</b>';
        if(nd.cat)h+='<span class="t" style="background:'+lc+'30;color:'+lc+'">'+nd.cat+'</span>';
        if(nd.lv)h+='<span class="t" style="background:rgba(255,255,255,.08);color:#8A7E72">'+nd.lv+'</span>';
        if(nd.tip)h+='<div style="margin-top:4px;font-size:12px;color:#b0a89e">'+nd.tip+'</div>';
        if(nd.dur)h+='<div style="margin-top:5px;padding:5px 9px;background:rgba(160,98,58,0.12);border-left:3px solid #A0623A;border-radius:0 5px 5px 0;font-size:11.5px;color:#D4B896"><span style="font-size:10px;font-weight:700;color:#A0623A;display:block;margin-bottom:1px">효과·지속기간</span>'+nd.dur+'</div>';
        if(nd.note)h+='<div style="margin-top:5px;padding:5px 9px;background:rgba(192,80,48,0.1);border-left:3px solid #C05030;border-radius:0 5px 5px 0;font-size:11.5px;color:#E8C4A8"><span style="font-size:10px;font-weight:700;color:#C05030;display:block;margin-bottom:1px">[주의] 주의사항</span>'+nd.note+'</div>';
        if(nd.eff)h+='<div style="margin-top:5px;padding:5px 9px;background:rgba(192,139,92,0.1);border-left:3px solid #C08B5C;border-radius:0 5px 5px 0;font-size:11.5px;color:#D4B896">'+nd.eff+'</div>';
        if(nd.who)h+='<div class="who-box"><span class="who-label">이런 분께 추천</span>'+nd.who+'</div>';
        showT(e,h);found=true;break;
      }
    }
    if(nd.isJ||nd.isSub||nd.isSub2){
      var dx2=mx-nd.x,dy2=my-nd.y;
      if(dx2*dx2+dy2*dy2<nd.r*nd.r){
        if(nd.isSub&&nd.brandInfo){
          var sc=nd.color||'#fff';
          var bh='<b>'+nd.name+'</b>';
          var lines=nd.brandInfo.split('\n');
          bh+='<div style="margin-top:6px">';
          for(var bi2=0;bi2<lines.length;bi2++){
            if(bi2===0){bh+='<div style="font-size:11px;font-weight:700;color:'+sc+';margin-bottom:4px">'+lines[bi2]+'</div>';}
            else{bh+='<div style="font-size:11px;color:#B0A89E;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.06)">'+lines[bi2]+'</div>';}
          }
          bh+='</div>';
          showT(e,bh);found=true;break;
        }
        if(nd.isSub2&&nd.tip){
          var sc2=nd.color||'#fff';
          var bh2='<b style="color:'+sc2+'">'+nd.name+'</b>';
          bh2+='<div style="margin-top:6px;font-size:11px;color:#B0A89E">'+nd.tip+'</div>';
          showT(e,bh2);found=true;break;
        }
        found=true;break;
      }
    }
  }
  if(!found)hideT();
  cv.style.cursor=found?'pointer':'grab';
});
cv.addEventListener('mouseleave',function(){hideT();if(drag.active){drag.active=false}});

// ========== MOUSEDOWN — start drag ==========
cv.addEventListener('mousedown',function(e){
  if(e.button!==0)return;
  var rect=cv.getBoundingClientRect();
  drag.startX=e.clientX-rect.left;
  drag.startY=e.clientY-rect.top;
  drag.startTx=zoom.tx;
  drag.startTy=zoom.ty;
  drag.moved=false;

  // Check if clicking on a group node (journey/sub/sub2) for node dragging
  var w=screen2world(drag.startX,drag.startY);
  var hitNode=hitTestLayout(w.x,w.y);
  if(hitNode){
    drag.nodeDrag=true;
    drag.dragNode=hitNode;
    drag.dragStartWx=w.x;
    drag.dragStartWy=w.y;
    var activeArr=needsMode?needsLayoutNodes:layoutNodes;
    drag.dragChildren=findDescendants(hitNode,activeArr);
    drag.active=true;
    cv.style.cursor='move';
  }else{
    drag.nodeDrag=false;
    drag.dragNode=null;
    drag.dragChildren=[];
    drag.active=true;
  }
});

// ========== MOUSEUP — end drag or click ==========
cv.addEventListener('mouseup',function(e){
  var wasDrag=drag.moved;
  var wasNodeDrag=drag.nodeDrag;
  drag.active=false;
  drag.moved=false;
  drag.nodeDrag=false;
  drag.dragNode=null;
  drag.dragChildren=[];

  // If user dragged (node or background), don't fire click logic
  if(wasDrag){
    cv.style.cursor='grab';
    if(!wasNodeDrag){
      var iz=getInitZoom(INIT_SCALE);
      if(zoom.scale>(INIT_SCALE+0.05)||Math.abs(zoom.tx-iz.tx)>20||Math.abs(zoom.ty-iz.ty)>20){
        backBtn.className='back-btn show';
        zoomHint.classList.add('hide');
      }
    }
    return;
  }

  // Click logic (no drag happened)
  var rect=cv.getBoundingClientRect();
  var w=screen2world(e.clientX-rect.left,e.clientY-rect.top);
  var mx=w.x,my=w.y;
  var nd=hitTest(mx,my);

  if(!nd)return; // clicked empty space without dragging — do nothing

  if(nd.isCenter){zoomOut();return;}
  if(nd.isJ){
    if(zoom.focused==='j'+nd.ji){zoomOut();}
    else{zoom.focused='j'+nd.ji;zoomTo(nd.x,nd.y,2.2);}
    return;
  }
  if(nd.isSub){
    if(zoom.focused==='s'+nd.ji+'_'+nd.si){zoomOut();}
    else{zoom.focused='s'+nd.ji+'_'+nd.si;zoomTo(nd.x,nd.y,3.5);}
    return;
  }
  if(nd.isSub2){
    if(zoom.focused==='s2'+nd.name){zoomOut();}
    else{zoom.focused='s2'+nd.name;zoomTo(nd.x,nd.y,5.0);}
    return;
  }
  if(nd.isL||nd.isBrand){
    if(needsMode && nd.isNeedsLeaf){
      // Jump to procedure view and focus on this node
      needsMode=false;
      var dot=document.getElementById('toggleDot');
      var track=document.getElementById('toggleTrack');
      var lbl=document.getElementById('viewLabel');
      var lblR=document.getElementById('viewLabelR');
      var origLegend=document.querySelector('#p0 .legend:not(#needsLegend)');
      var needsLeg=document.getElementById('needsLegend');
      dot.style.left='2px'; track.style.background='#4A4540';
      lbl.style.color='#C08B5C'; lbl.style.fontWeight='700';
      lblR.style.color='#8A7E72'; lblR.style.fontWeight='400';
      origLegend.style.display='flex'; needsLeg.style.display='none';
      // Find matching node in procedure view
      draw();
      setTimeout(function(){
        var foundNode=null;
        var searchName=nd.name;
        for(var k=0;k<nodes.length;k++){
          if(nodes[k].name===searchName && (nodes[k].isL||nodes[k].isBrand)){foundNode=nodes[k];break;}
        }
        if(foundNode){
          zoomTo(foundNode.x, foundNode.y, 5.5);
          highlightedNames.add(foundNode.name);
          draw();
          setTimeout(function(){highlightedNames.delete(foundNode.name);draw()},2500);
        }
      },100);
      return;
    }
    if(zoom.focused==='l'+nd.name){showNodeCard(nd);return;}
    else{zoom.focused='l'+nd.name;zoomTo(nd.x,nd.y,5.5);}
    return;
  }
});

// Right-click to zoom out
cv.addEventListener('contextmenu',function(e){
  e.preventDefault();
  if(zoom.scale>(INIT_SCALE+0.05))zoomOut();
});

// Keyboard: Escape to zoom out
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    if(document.getElementById('photoPopup').classList.contains('show')){closePhotoPopup();return}
    if(document.getElementById('nodeOverlay').classList.contains('show')){closeNodeCard();return}
    if(zoom.scale>(INIT_SCALE+0.05))zoomOut();
  }
});

// Mouse wheel zoom
cv.addEventListener('wheel',function(e){
  e.preventDefault();
  var rect=cv.getBoundingClientRect();
  var mx=e.clientX-rect.left;
  var my=e.clientY-rect.top;
  var w=screen2world(mx,my);

  var factor=e.deltaY<0?1.07:1/1.07;
  var ns=Math.max(0.15,Math.min(6,zoom.target.scale*factor));

  zoom.target.scale=ns;
  zoom.target.tx=mx-w.x*ns;
  zoom.target.ty=my-w.y*ns;

  var aboveInit=ns>(INIT_SCALE+0.05);
  if(aboveInit){backBtn.className='back-btn show';zoomHint.classList.add('hide')}
  else{backBtn.className='back-btn';zoomHint.classList.remove('hide')}

  zoom.focused=aboveInit?'wheel':null;
  if(!zoom.animating){zoom.animating=true;animateZoom()}
},{passive:false});

// ========== NEEDS VIEW TOGGLE ==========
function toggleNeedsMode(){
  needsMode=!needsMode;
  if(needsMode){hidePkgPanel()}else{showPkgPanel()}
  var dot=document.getElementById('toggleDot');
  var track=document.getElementById('toggleTrack');
  var lbl=document.getElementById('viewLabel');
  var lblR=document.getElementById('viewLabelR');
  var origLegend=document.querySelector('#p0 .legend:not(#needsLegend)');
  var needsLeg=document.getElementById('needsLegend');
  if(needsMode){
    dot.style.left='22px'; track.style.background='#C08B5C';
    lbl.style.color='#8A7E72'; lbl.style.fontWeight='400';
    lblR.style.color='#C08B5C'; lblR.style.fontWeight='700';
    origLegend.style.display='none'; needsLeg.style.display='flex';
  }else{
    dot.style.left='2px'; track.style.background='#4A4540';
    lbl.style.color='#C08B5C'; lbl.style.fontWeight='700';
    lblR.style.color='#8A7E72'; lblR.style.fontWeight='400';
    origLegend.style.display='flex'; needsLeg.style.display='none';
  }
  if(needsMode){
    computeNeedsLayout();
    zoomOutNeeds();
  }else{
    zoomOut();
  }
  draw();
  buildNavPanel();
}

// ========== NEEDS LAYOUT ==========
function computeNeedsLayout(){
  needsLayoutNodes=[];
  ctx.save();
  ctx.setTransform(DPR,0,0,DPR,0,0);

  var ns=needsTree.n;
  var N=ns.length; // 6 categories
  var sectorAngle=2*Math.PI/N; // 60° per category
  var startOffset=-Math.PI/2; // start from top

  // Build a lookup: item name → node data from tree.j
  var itemLookup={};
  tree.j.forEach(function(j){j.subs.forEach(function(s){s.items.forEach(function(it){
    itemLookup[it.n]=it;
    if(it.brands) it.brands.forEach(function(b){ itemLookup[b.n]=b; });
  })})});

  for(var ni=0;ni<N;ni++){
    var need=ns[ni], nColor=need.color;
    // Center angle of this category's sector
    var nAngle=startOffset + ni*sectorAngle;
    // Sector boundaries
    var sectorMin=nAngle - sectorAngle/2 + 0.06;
    var sectorMax=nAngle + sectorAngle/2 - 0.06;

    // Ring 1: Need category node
    var nR=560;
    var nx=CX+Math.cos(nAngle)*nR, ny=CY+Math.sin(nAngle)*nR;

    ctx.font='bold 13px "Pretendard Variable",Pretendard,-apple-system,system-ui';
    var nbw=Math.max(ctx.measureText(need.name).width+28,100), nbh=32;
    needsLayoutNodes.push({x:nx,y:ny,hw:nbw/2,hh:nbh/2,type:'journey',
      name:need.name,color:nColor,ji:ni,parentX:CX,parentY:CY,bw:nbw,bh:nbh});

    // Ring 2: Sub-concerns — distribute evenly within sector
    var subs=need.subs;
    var subPadding=0.04;
    var subAvailable=sectorMax-sectorMin-subPadding*2;
    var subStep=subs.length>1?subAvailable/(subs.length-1):0;
    var subStartAngle=subs.length>1?(sectorMin+subPadding):(nAngle);

    for(var si=0;si<subs.length;si++){
      var sub=subs[si];
      var sAngle=subStartAngle+si*subStep;
      var sR=420;
      var sx=nx+Math.cos(sAngle)*sR, sy=ny+Math.sin(sAngle)*sR;

      ctx.font='600 10.5px "Pretendard Variable",Pretendard,-apple-system,system-ui';
      var sw2=Math.max(ctx.measureText(sub.name).width+18,70), sh2=24;
      needsLayoutNodes.push({x:sx,y:sy,hw:sw2/2,hh:sh2/2,type:'sub',
        name:sub.name,color:nColor,ji:ni,si:si,parentX:nx,parentY:ny,bw:sw2,bh:sh2});

      // Ring 3: Tiers — distribute within sub's angular neighborhood
      var tiers=sub.tiers||[];
      var activeTiers=tiers.filter(function(t){return t.rank>0});
      var gSectorHalf=subStep>0?subStep/2*0.85:sectorAngle/3;
      var gMin=sAngle-gSectorHalf;
      var gMax=sAngle+gSectorHalf;
      var gAvail=gMax-gMin;
      var gStep=activeTiers.length>1?gAvail/(activeTiers.length-1):0;
      var gStartAngle=activeTiers.length>1?gMin:sAngle;
      var globalLi=0;

      for(var gi=0;gi<activeTiers.length;gi++){
        var tier=activeTiers[gi];
        var gAngle=gStartAngle+gi*gStep;
        var gR=320;
        var gx=sx+Math.cos(gAngle)*gR, gy=sy+Math.sin(gAngle)*gR;

        // Tier node (sub2 type)
        ctx.font='600 9.5px "Pretendard Variable",Pretendard,-apple-system,system-ui';
        var gbw=Math.max(ctx.measureText(tier.name).width+16,65), gbh=22;
        needsLayoutNodes.push({x:gx,y:gy,hw:gbw/2,hh:gbh/2,type:'sub2',
          name:tier.name,color:nColor,ji:ni,si:si,li:gi,
          parentX:sx,parentY:sy,bw:gbw,bh:gbh,tip:tier.name+' ('+tier.tag+')'});

        // Ring 4: Programs — fan out from tier node
        var gItems=tier.programs;
        var iSectorHalf=gStep>0?gStep/2*0.8:gSectorHalf/2;
        var iMin=gAngle-iSectorHalf;
        var iMax=gAngle+iSectorHalf;
        var iStep=gItems.length>1?(iMax-iMin)/(gItems.length-1):0;
        var iStartAngle=gItems.length>1?iMin:gAngle;

        for(var li=0;li<gItems.length;li++){
          var itemName=gItems[li];
          var ref=itemLookup[itemName]||{};
          var lAngle=iStartAngle+li*iStep;
          var lR=210+(li%2)*35;
          var lx=gx+Math.cos(lAngle)*lR, ly=gy+Math.sin(lAngle)*lR;

          ctx.font='400 9px "Pretendard Variable",Pretendard,-apple-system,system-ui';
          var displayName=itemName.replace(/\n/g,' ');
          var tw=ctx.measureText(displayName).width;
          var textLines=Math.ceil(tw/72);
          var leafHW=Math.min(tw,72)/2+4;
          var dotR=Math.max(3,6);
          var leafHH=dotR+4+textLines*11;
          var leafColor=nColor;
          var lv=ref.l||'';

          needsLayoutNodes.push({x:lx,y:ly+leafHH/2-dotR,hw:leafHW,hh:leafHH/2+2,type:'leaf',
            name:itemName,displayName:displayName,tip:ref.t||'',who:ref.w||'',eff:ref.eff||'',
            note:ref.note||'',dur:ref.dur||'',
            cat:ref.c||'',lv:lv,v:ref.v||5,
            color:leafColor,ji:ni,si:si,gi:gi,li:globalLi,
            parentX:gx,parentY:gy,dotR:dotR,textLines:textLines,
            isNeedsLeaf:true});
          globalLi++;
        }
      }
    }
  }
  ctx.restore();
  resolveCollisions(needsLayoutNodes, 500);
}

function buildPkgPanel(){
  var panel=document.getElementById('pkgPanel');
  panel.innerHTML='<div class="pkg-drag-handle" id="pkgDragHandle">⠿</div>'
    +'<div style="font-size:13px;font-weight:700;color:#2D2A26;padding:4px 8px 8px;border-bottom:1px solid #E8E3DC;margin-bottom:8px">프로그램</div>';
  // Drag to move panel
  var handle=document.getElementById('pkgDragHandle');
  var pdrag={active:false,sx:0,sy:0,ox:0,oy:0};
  handle.onmousedown=function(e){
    pdrag.active=true;pdrag.sx=e.clientX;pdrag.sy=e.clientY;
    pdrag.ox=panel.offsetLeft;pdrag.oy=panel.offsetTop;
    handle.style.cursor='grabbing';
    e.preventDefault();
  };
  // Restore saved position
  var saved=localStorage.getItem('pkgPanelPos');
  if(saved){try{var sp=JSON.parse(saved);panel.style.left=sp.x+'px';panel.style.top=sp.y+'px';panel.style.right='auto'}catch(e){}}
  document.addEventListener('mousemove',function(e){
    if(!pdrag.active)return;
    var nx=pdrag.ox+e.clientX-pdrag.sx;
    var ny=pdrag.oy+e.clientY-pdrag.sy;
    panel.style.left=nx+'px';
    panel.style.top=ny+'px';
    panel.style.right='auto';
  });
  document.addEventListener('mouseup',function(){
    if(pdrag.active){
      pdrag.active=false;handle.style.cursor='grab';
      // Save position to localStorage
      localStorage.setItem('pkgPanelPos',JSON.stringify({x:panel.offsetLeft,y:panel.offsetTop}));
    }
  });
  packageDefs.forEach(function(cat,ci){
    var catDiv=document.createElement('div');
    catDiv.className='pkg-cat';
    var header=document.createElement('div');
    header.className='pkg-cat-header';
    header.textContent='▸ '+cat.cat+' ('+cat.items.length+')';
    header.onclick=function(){
      catDiv.classList.toggle('open');
      header.textContent=(catDiv.classList.contains('open')?'▾ ':'▸ ')+cat.cat+' ('+cat.items.length+')';
    };
    catDiv.appendChild(header);

    var body=document.createElement('div');
    body.className='pkg-cat-body';
    cat.items.forEach(function(pkg){
      var item=document.createElement('div');
      item.className='pkg-item';
      item.innerHTML='<div class="pkg-name">'+pkg.name+'</div>'
        +'<div class="pkg-desc">'+pkg.desc+'</div>'
        +'<div class="pkg-components">구성: '+pkg.components.map(function(c){return c.replace(/\n/g,' ')}).join(' + ')+'</div>';
      item.onclick=function(e){
        e.stopPropagation();
        if(item.classList.contains('active')){
          item.classList.remove('active');
          clearPkgHighlight();
          activePkg=null;
        }else{
          // Deactivate others
          panel.querySelectorAll('.pkg-item.active').forEach(function(el){el.classList.remove('active')});
          item.classList.add('active');
          activePkg=pkg;
          highlightComponents(pkg.components);
          // Auto-open category
          if(!catDiv.classList.contains('open')){
            catDiv.classList.add('open');
            header.textContent='▾ '+cat.cat+' ('+cat.items.length+')';
          }
        }
      };
      body.appendChild(item);
    });
    catDiv.appendChild(body);
    panel.appendChild(catDiv);
  });
}

function highlightComponents(names){
  highlightedNames.clear();
  names.forEach(function(n){highlightedNames.add(n)});
  draw();
  // Zoom to fit all highlighted nodes in one view
  zoomToFitNodes(names);
}

function zoomToFitNodes(names){
  var nameSet=new Set(names);
  var matchedNodes=[];
  for(var i=0;i<nodes.length;i++){
    if(nameSet.has(nodes[i].name))matchedNodes.push(nodes[i]);
  }
  if(matchedNodes.length===0)return;
  if(matchedNodes.length===1){
    zoomTo(matchedNodes[0].x,matchedNodes[0].y,4.0);return;
  }
  // Calculate bounding box
  var minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  matchedNodes.forEach(function(nd){
    var r=nd.r||40;
    if(nd.x-r<minX)minX=nd.x-r;
    if(nd.x+r>maxX)maxX=nd.x+r;
    if(nd.y-r<minY)minY=nd.y-r;
    if(nd.y+r>maxY)maxY=nd.y+r;
  });
  // Add padding
  var pad=100;
  minX-=pad;minY-=pad;maxX+=pad;maxY+=pad;
  var bw=maxX-minX,bh=maxY-minY;
  var cx=minX+bw/2,cy=minY+bh/2;
  // Calculate scale to fit
  var sx=W/bw,sy=H/bh;
  var scale=Math.min(sx,sy,5.0);
  scale=Math.max(scale,0.5);
  zoomTo(cx,cy,scale);
}

function clearPkgHighlight(){
  highlightedNames.clear();
  activePkg=null;
  draw();
}

(function(){
  var params=new URLSearchParams(window.location.search);
  var viewParam=params.get('view');
  var concernParam=params.get('concern');
  var subParam=params.get('sub');
  if(!viewParam&&!concernParam)return;

  setTimeout(function(){
    try{
      if(viewParam==='guide'){
        // Set flowState directly then render
        if(concernParam){
          // Match concern to needsTree category
          var concernKws=concernParam.split('/');
          for(var ci=0;ci<needsTree.n.length;ci++){
            var catName=needsTree.n[ci].name;
            var matched=false;
            for(var ki=0;ki<concernKws.length;ki++){
              if(catName.indexOf(concernKws[ki])>=0){matched=true;break;}
            }
            if(matched){
              flowState.catIdx=ci;
              flowState.subIdx=-1;
              flowState.tierIdx=-1;
              // Match sub-concern if provided
              if(subParam){
                for(var si=0;si<needsTree.n[ci].subs.length;si++){
                  if(needsTree.n[ci].subs[si].name.indexOf(subParam)>=0){
                    flowState.subIdx=si;
                    break;
                  }
                }
              }
              break;
            }
          }
        }
        sw(1); // This calls drawFlow() which reads flowState
      } else if(viewParam==='mindmap'){
        sw(0);
        if(!needsMode) toggleNeedsMode();
        if(concernParam){
          setTimeout(function(){
            var concernKws=concernParam.split('/');
            var targetNode=null;
            for(var ni=0;ni<nodes.length;ni++){
              if(!nodes[ni].name||nodes[ni].isCenter)continue;
              for(var ki=0;ki<concernKws.length;ki++){
                if(nodes[ni].name.indexOf(concernKws[ki])>=0){targetNode=nodes[ni];break;}
              }
              if(targetNode)break;
            }
            if(targetNode){
              var tz=4;
              zoom.target.scale=tz;
              zoom.target.tx=CX-targetNode.x*tz;
              zoom.target.ty=CY-targetNode.y*tz;
              animateZoom();
            }
          },300);
        }
      }
    }catch(e){console.error('URL nav error:',e)}
  },800);
})();

// ========== 검색 기능 ==========
(function(){
  var sinput = document.getElementById('search-input');
  var sresults = document.getElementById('search-results');

  // 전체 노드에서 검색 가능한 항목 목록 생성
  function buildSearchIndex(){
    var idx = [];
    tree.j.forEach(function(jn, ji){
      jn.subs.forEach(function(sub, si){
        // sub 그룹명
        idx.push({name: sub.name, path: jn.name, type:'sub', ji:ji, si:si});
        (sub.items||[]).forEach(function(item){
          // brand 그룹
          if(item.brands){
            idx.push({name: item.n, path: jn.name+' > '+sub.name, type:'brands', ji:ji, si:si, itemName:item.n});
            item.brands.forEach(function(b){
              idx.push({name: b.n, path: jn.name+' > '+sub.name+' > '+item.n, type:'leaf', ji:ji, si:si, itemName:item.n, brandName:b.n, nodeRef:b});
            });
          } else {
            idx.push({name: item.n, path: jn.name+' > '+sub.name, type:'leaf', ji:ji, si:si, itemName:item.n, nodeRef:item});
          }
        });
      });
    });
    return idx;
  }

  var searchIndex = [];
  // nodes가 준비된 후 인덱스 구성
  setTimeout(function(){ searchIndex = buildSearchIndex(); }, 300);

  function highlight(text, query){
    if(!query) return text;
    var re = new RegExp('('+query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    return text.replace(re,'<span class="sr-hl">$1</span>');
  }

  function doSearch(q){
    if(!q || q.length < 1){ sresults.innerHTML=''; sresults.classList.remove('show'); return; }
    var matched = searchIndex.filter(function(item){
      return item.name.toLowerCase().indexOf(q.toLowerCase()) !== -1;
    }).slice(0, 15);

    if(matched.length === 0){
      sresults.innerHTML = '<div class="sr-empty">검색 결과가 없습니다</div>';
      sresults.classList.add('show');
      return;
    }

    sresults.innerHTML = matched.map(function(item, i){
      return '<div class="sr-item" data-idx="'+i+'">'
        +'<div class="sr-name">'+highlight(item.name, q)+'</div>'
        +'<div class="sr-path">'+item.path+'</div>'
        +'</div>';
    }).join('');
    sresults.classList.add('show');

    // 클릭 이동 + 툴팁 표시
    sresults.querySelectorAll('.sr-item').forEach(function(el, i){
      el.addEventListener('click', function(){
        var item = matched[i];
        navigateTo(item);
        sresults.classList.remove('show');
        sinput.value = '';
      });
    });
  }

  function buildTooltipHtml(nd){
    var lc = nd.color || '#fff';
    var h = '<b>' + nd.name + '</b>';
    if(nd.cat) h += '<span class="t" style="background:'+lc+'30;color:'+lc+'">'+nd.cat+'</span>';
    if(nd.lv)  h += '<span class="t" style="background:rgba(255,255,255,.08);color:#8A7E72">'+nd.lv+'</span>';

var tmDone=false;
var flowState={catIdx:-1, subIdx:-1, tierIdx:-1};

// Need icons for categories
var needIconColors=needsTree.n.map(function(n){return n.color});
var needDescs=[
  "이마주름, 팔자, 눈가, 목주름, 볼처짐, 턱라인 처짐",

];

function flowReset(){
  flowState={catIdx:-1,subIdx:-1,tierIdx:-1};
  drawFlow();
}

function drawFlow(){
  var wrap=document.getElementById('flow-wrap');
  if(!wrap)return;
  wrap.innerHTML='';

  var itemLookup={};
  tree.j.forEach(function(j){j.subs.forEach(function(s){s.items.forEach(function(it){
    itemLookup[it.n]=it;
    if(it.brands) it.brands.forEach(function(b){ itemLookup[b.n]=b; });
  })})});

  var rankColors=['','#D4A030','#8A7E72','#A0623A','#6A6560','#6A6560'];
  var CC2={"보톡스":"#C05030","필러":"#D4885A","바이오ST":"#E0A878","리프팅":"#A0623A","색소":"#C08B5C","모공흉터":"#C9956B","기타":"#D4B088","바디":"#8B6B50","수액":"#A88B70"};

  // Column 1: Need categories
  var col1=document.createElement('div');col1.className='flow-col col-cat';
  col1.innerHTML='<div class="flow-col-header">고민</div>';
  needsTree.n.forEach(function(need,ni){
    var item=document.createElement('div');
    item.className='flow-item'+(flowState.catIdx===ni?' selected':'');
    item.innerHTML='<div class="fi-name" style="color:'+need.color+'">'+need.name+'</div>'
      +'<div class="fi-count">'+need.subs.length+'개 세부</div>';
    item.onclick=function(){
      flowState.catIdx=ni;flowState.subIdx=-1;flowState.tierIdx=-1;
      drawFlow();
    };
    col1.appendChild(item);
  });
  wrap.appendChild(col1);

  // Column 2: Sub-concerns (if category selected)
  if(flowState.catIdx>=0){
    var cat=needsTree.n[flowState.catIdx];
    var col2=document.createElement('div');col2.className='flow-col col-sub';
    col2.innerHTML='<div class="flow-col-header" style="color:'+cat.color+'">'+cat.name+'</div>';
    cat.subs.forEach(function(sub,si){
      var pc=(sub.tiers||[]).reduce(function(s,t){return s+(t.rank>0?t.programs.length:0)},0);
      var item=document.createElement('div');
      item.className='flow-item'+(flowState.subIdx===si?' selected':'');
      item.style.borderLeftColor=cat.color;
      item.innerHTML='<div class="fi-name">'+sub.name+'</div>'
        +'<div class="fi-count">'+pc+'개 프로그램</div>';
      item.onclick=function(){
        flowState.subIdx=si;flowState.tierIdx=-1;
        drawFlow();
      };
      col2.appendChild(item);
    });
    wrap.appendChild(col2);
  }

  // Column 3: Tiers (if sub selected)
  if(flowState.catIdx>=0&&flowState.subIdx>=0){
    var cat=needsTree.n[flowState.catIdx];
    var sub=cat.subs[flowState.subIdx];
    var tiers=sub.tiers||[];
    var col3=document.createElement('div');col3.className='flow-col col-tier';
    col3.innerHTML='<div class="flow-col-header">'+sub.name+' 상담 위계</div>';
    tiers.forEach(function(tier,ti){
      if(tier.rank===0)return; // skip addons
      var rc=rankColors[Math.min(tier.rank,5)];
      var item=document.createElement('div');
      item.className='flow-item fi-tier'+(flowState.tierIdx===ti?' selected':'');
      item.style.borderLeftColor=rc;
      item.innerHTML='<div style="display:flex;align-items:center"><span class="fi-rank" style="background:'+rc+'">'+tier.rank+'</span><span class="fi-name">'+tier.name+'</span></div>'
        +'<div class="fi-desc">'+tier.desc+'</div>';
      item.onclick=function(){
        flowState.tierIdx=ti;
        drawFlow();
      };
      col3.appendChild(item);
    });
    wrap.appendChild(col3);
  }

  // Column 4: Programs (if tier selected)
  if(flowState.catIdx>=0&&flowState.subIdx>=0&&flowState.tierIdx>=0){
    var cat=needsTree.n[flowState.catIdx];
    var sub=cat.subs[flowState.subIdx];
    var tier=(sub.tiers||[])[flowState.tierIdx];
    if(tier){
      var col4=document.createElement('div');col4.className='flow-col col-prog';
      col4.innerHTML='<div class="flow-col-header">'+tier.name+' 프로그램</div>';
      tier.programs.forEach(function(progName){
        var ref=itemLookup[progName]||{};
        var cc=CC2[ref.c]||cat.color;
        var item=document.createElement('div');
        item.className='flow-item fi-program';
        item.style.borderLeftColor=cc;
        var shortTip=ref.t?(ref.t.length>80?ref.t.substring(0,80)+'…':ref.t):'';
        var photoHtml=getPhotoHtml(progName.replace(/\n/g,' '),'small');
        item.innerHTML='<div class="fi-name">'+progName.replace(/\n/g,' ')+'</div>'
          +(shortTip?'<div class="fi-desc">'+shortTip+'</div>':'')
          +photoHtml;
        item.onclick=function(){
          lastFlowState=JSON.parse(JSON.stringify(flowState));
          if(pkgNameSet.has(progName)){
            activatePkgByName(progName);
          }else{
            sw(0);
            setTimeout(function(){
              if(needsMode)toggleNeedsMode();
              setTimeout(function(){
                var found=null;
                for(var k=0;k<nodes.length;k++){
                  if(nodes[k].name===progName&&(nodes[k].isL||nodes[k].isBrand||nodes[k].isSub2)){found=nodes[k];break;}
                }
                if(found){
                  zoomTo(found.x,found.y,5.5);
                  highlightedNames.add(found.name);draw();
                  setTimeout(function(){highlightedNames.delete(found.name);draw()},2500);
                }
              },200);
            },100);
          }
        };
        col4.appendChild(item);
      });
      wrap.appendChild(col4);
    }
  }

  // Auto-scroll to show latest column
  setTimeout(function(){wrap.scrollLeft=wrap.scrollWidth},50);
  return; // skip old level-based code below

  var CC2={"보톡스":"#C05030","필러":"#D4885A","바이오ST":"#E0A878","리프팅":"#A0623A","색소":"#C08B5C","모공흉터":"#C9956B","기타":"#D4B088","바디":"#8B6B50","수액":"#A88B70"};
  var badgeColors={"1순위":"#D4A030","핵심":"#C08B5C","업셀":"#8B6B50","진입":"#B0A89E","2순위":"#8A7E72"};

  if(flowState.level===0){
    // Level 0: Show 6 need categories
    bread.innerHTML='<span class="flow-current">톤즈 가이드</span><span style="margin-left:8px;font-size:11px;color:#6a6560">고객의 고민을 선택하세요</span>';
    cards.innerHTML='';
    cards.style.display='grid';
    needsTree.n.forEach(function(need,i){
      var card=document.createElement('div');
      card.className='flow-card';
      card.style.borderTop='3px solid '+need.color;
      card.innerHTML='<div class="fc-icon" style="width:24px;height:24px;border-radius:50%;background:'+needIconColors[i]+';margin-bottom:8px"></div>'
        +'<div class="fc-title">'+need.name+'</div>'
        +'<div class="fc-desc">'+needDescs[i]+'</div>'
        +'<div class="fc-count">'+need.subs.length+'개 고민</div>'
        +'<div class="fc-arrow">→</div>';
      card.onclick=function(){
        flowState.level=1; flowState.catIdx=i;
        drawFlow();
      };
      cards.appendChild(card);
    });

  }else if(flowState.level===1){
    // Level 1: Show sub-concerns for selected category
    var cat=needsTree.n[flowState.catIdx];
    bread.innerHTML='<span class="flow-home" onclick="flowReset()">톤즈 가이드</span>'
      +'<span class="flow-sep">›</span>'
      +'<span class="flow-current" style="color:'+cat.color+'">'+cat.name+'</span>'
      +'<span style="margin-left:8px;font-size:11px;color:#6a6560">세부 고민을 선택하세요</span>';
    cards.innerHTML='';
    cards.style.display='grid';
    cat.subs.forEach(function(sub,si){
      var card=document.createElement('div');
      card.className='flow-card';
      card.style.borderLeft='3px solid '+cat.color;
      var progCount=(sub.tiers||[]).reduce(function(s,t){return s+(t.rank>0?t.programs.length:0)},0);
      card.innerHTML='<div class="fc-title">'+sub.name+'</div>'
        +'<div class="fc-desc">추천 시술 '+progCount+'개 프로그램</div>'
        +'<div class="fc-arrow">→</div>';
      card.onclick=function(){
        flowState.level=2; flowState.subIdx=si;
        drawFlow();
      };
      cards.appendChild(card);
    });

  }else if(flowState.level===2){
    // Level 2: Show consultation tiers (vertical step cards)
    var cat=needsTree.n[flowState.catIdx];
    var sub=cat.subs[flowState.subIdx];
    bread.innerHTML='<span class="flow-home" onclick="flowReset()">톤즈 가이드</span>'
      +'<span class="flow-sep">›</span>'
      +'<span class="flow-home" onclick="flowState.level=1;drawFlow()" style="color:'+cat.color+'">'+cat.name+'</span>'
      +'<span class="flow-sep">›</span>'
      +'<span class="flow-current">'+sub.name+'</span>';
    cards.innerHTML='';
    cards.style.display='block';

    // Combo card (if exists)
    if(sub.combo){
      var combo=sub.combo;
      var comboCard=document.createElement('div');
      comboCard.className='flow-card';
      comboCard.style.cssText='border:2px solid #D4A030;background:linear-gradient(135deg,rgba(212,160,48,0.08),rgba(212,160,48,0.02));margin-bottom:16px';
      comboCard.innerHTML='<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px"><span style="font-size:18px">[추천] </span><span class="fc-title" style="margin:0">'+combo.name+'</span></div>'
        +'<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">'+combo.items.map(function(it){
          var ref2=itemLookup[it]||{};
          var cc2=CC2[ref2.c]||cat.color;
          return '<span style="padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600;background:'+cc2+'18;color:'+cc2+';border:1px solid '+cc2+'30">'+it.replace(/\n/g,' ')+'</span>';
        }).join('<span style="color:#D4A030;font-weight:700"> + </span>')+'</div>'
        +'<div class="fc-desc" style="color:#D4A030">'+combo.desc+'</div>';
      cards.appendChild(comboCard);
    }

    // Tier step cards
    var rankColors=['','#D4A030','#8A7E72','#A0623A','#6A6560','#6A6560'];
    var tiers=sub.tiers||[];
    tiers.forEach(function(tier,ti){
      if(tier.rank===0){
        // Addon row (dashed, dimmed)
        var step=document.createElement('div');
        step.className='tier-step tier-addon';
        step.innerHTML='<div class="tier-rank"><div class="rank-num" style="background:#6A6560;font-size:10px">+</div></div>'
          +'<div class="tier-body"><span class="tier-name">'+tier.name+'</span>'
          +'<div class="tier-desc">'+tier.desc+'</div>'
          +'<div class="tier-programs">'+tier.programs.map(function(p){return p.replace(/\n/g,' ')}).join(' · ')+'</div></div>';
        cards.appendChild(step);
        return;
      }
      var rc=rankColors[Math.min(tier.rank,5)];
      var step=document.createElement('div');
      step.className='tier-step';
      var tagHtml=tier.tag?'<span class="tier-tag" style="background:'+rc+'22;color:'+rc+'">'+tier.tag+'</span>':'';
      step.innerHTML='<div class="tier-rank"><div class="rank-num" style="background:'+rc+'">'+tier.rank+'</div><div class="rank-line" style="background:linear-gradient(to bottom,'+rc+',transparent)"></div></div>'
        +'<div class="tier-body"><span class="tier-name">'+(tier.programs.length===1?tier.programs[0].replace(/\n/g,' '):tier.name)+'</span>'+tagHtml
        +'<div class="tier-desc">'+tier.desc+'</div>'
        +'<div class="tier-programs">'+tier.programs.map(function(p){return p.replace(/\n/g,' ')}).join(' · ')+'</div>'
        +'<div class="fc-arrow">→</div></div>';
      step.querySelector('.tier-body').onclick=function(){
        if(tier.programs.length===1){
          var progName=tier.programs[0];
          lastFlowState=JSON.parse(JSON.stringify(flowState));
          if(pkgNameSet.has(progName)){
            activatePkgByName(progName);return;
          }
          sw(0);
          setTimeout(function(){
            if(needsMode) toggleNeedsMode();
            setTimeout(function(){
              var found=null;
              for(var k=0;k<nodes.length;k++){
                if(nodes[k].name===progName && (nodes[k].isL||nodes[k].isBrand||nodes[k].isSub2)){found=nodes[k];break;}
              }
              if(found){
                zoomTo(found.x, found.y, 5.5);
                highlightedNames.add(found.name);
                draw();
                setTimeout(function(){highlightedNames.delete(found.name);draw()},2500);
              }
            },200);
          },100);
        }else{
          flowState.level=3; flowState.groupIdx=ti;
          drawFlow();
        }
      };
      cards.appendChild(step);
    });

  }else if(flowState.level===3){
    // Level 3: Show programs within selected tier
    var cat=needsTree.n[flowState.catIdx];
    var sub=cat.subs[flowState.subIdx];
    var tier=(sub.tiers||[])[flowState.groupIdx];
    if(!tier){flowState.level=2;drawFlow();return;}
    bread.innerHTML='<span class="flow-home" onclick="flowReset()">톤즈 가이드</span>'
      +'<span class="flow-sep">›</span>'
      +'<span class="flow-home" onclick="flowState.level=1;drawFlow()" style="color:'+cat.color+'">'+cat.name+'</span>'
      +'<span class="flow-sep">›</span>'
      +'<span class="flow-home" onclick="flowState.level=2;drawFlow()">'+sub.name+'</span>'
      +'<span class="flow-sep">›</span>'
      +'<span class="flow-current">'+tier.name+'</span>';
    cards.innerHTML='';
    cards.style.display='grid';
    tier.programs.forEach(function(progName){
      var ref=itemLookup[progName]||{};
      var card=document.createElement('div');
      card.className='flow-card fc-proc';
      var catColor=CC2[ref.c]||cat.color;
      card.style.borderLeftColor=catColor;
      var html='<div class="fc-title">'+progName.replace(/\n/g,' ')+'</div>';
      if(ref.t){
        var shortTip=ref.t.length>120?ref.t.substring(0,120)+'…':ref.t;
        html+='<div class="fc-desc">'+shortTip+'</div>';
      }
      if(ref.l){
        var bc=badgeColors[ref.l]||'#B0A89E';
        html+='<span class="fc-badge" style="background:'+bc+'22;color:'+bc+'">'+ref.l+'</span>';
      }
      if(ref.w){
        var shortWho=ref.w.length>100?ref.w.substring(0,100)+'…':ref.w;
        html+='<div class="fc-who"><b style="font-size:10px;color:#C08B5C;display:block;margin-bottom:2px">이런 분께 추천</b>'+shortWho+'</div>';
      }
      card.innerHTML=html;
      card.onclick=function(){
        // Save flow state for "return to guide" feature
        lastFlowState=JSON.parse(JSON.stringify(flowState));
        // Check if this program is a package — if so, activate package filter
        if(pkgNameSet.has(progName)){
          activatePkgByName(progName);
          return;
        }
        // Otherwise jump to individual node in mindmap
        sw(0);
        setTimeout(function(){
          if(needsMode) toggleNeedsMode();
          setTimeout(function(){
            var found=null;
            for(var k=0;k<nodes.length;k++){
              if(nodes[k].name===progName && (nodes[k].isL||nodes[k].isBrand||nodes[k].isSub2)){found=nodes[k];break;}
            }
            if(found){
              zoomTo(found.x, found.y, 5.5);
              highlightedNames.add(found.name);
              draw();
              setTimeout(function(){highlightedNames.delete(found.name);draw()},2500);
            }
          },200);
        },100);
      };
      cards.appendChild(card);
    });
  }
}
