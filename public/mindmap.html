// --- Button system ---
// multiSelect: false = single click sends, true = multi-select with "선택 완료" button
function cgShowButtons(id,opts,multiSelect){
  var c=document.getElementById('cgMessages');
  var wrap=document.createElement('div');wrap.className='cg-chips';wrap.id=id;
  if(!multiSelect){
    opts.forEach(function(o){
      var btn=document.createElement('button');btn.className='cg-chip';btn.textContent=o.label;
      btn.onclick=function(){document.getElementById(id).remove();cgOnSelect(o.value);};
      wrap.appendChild(btn);
    });
  } else {
    var selected=[];
    opts.forEach(function(o){
      var btn=document.createElement('button');btn.className='cg-chip';btn.textContent=o.label;
      btn.onclick=function(){
        var idx=selected.indexOf(o.value);
        if(idx>=0){selected.splice(idx,1);btn.style.background='#FFFFFF';btn.style.borderColor='#E8E3DC';btn.style.color='#4A4540';}
        else{selected.push(o.value);btn.style.background='rgba(192,139,92,0.12)';btn.style.borderColor='#C08B5C';btn.style.color='#A0623A';}
      };
      wrap.appendChild(btn);
    });
    var sendBtn=document.createElement('button');sendBtn.className='cg-chip';
    sendBtn.style.background='#E87A00';sendBtn.style.color='#FFFFFF';sendBtn.style.borderColor='#E87A00';sendBtn.style.fontWeight='600';
    sendBtn.textContent='선택 완료';
    sendBtn.onclick=function(){if(selected.length===0)return;document.getElementById(id).remove();cgOnSelect(selected.join(', '));};
    wrap.appendChild(sendBtn);
  }
  c.appendChild(wrap);c.scrollTop=c.scrollHeight;
}

// --- Stage machine ---
function cgOnSelect(value){
  cgAddUsr(value);
  cgLogMessage('user',value);

  if(cgStage===0){
    // Stage 0: visit type selected
    if(value.indexOf('다녀본')>=0||value.indexOf('재방문')>=0){
      // Revisit -> show purpose buttons
      cgIsRevisit=true;
      cgStage=0.5;
      cgCallAI(value,function(){
        cgAddSys('다시 찾아주셨군요! 오늘은 어떤 이유로 방문하셨어요?');
        cgShowButtons('cgRevisitPurpose',[
          {label:'기존 시술 유지/관리',value:'기존 시술 유지 및 관리 목적으로 방문했어요'},
          {label:'새로운 고민 상담',value:'새로운 고민이 있어서 상담받고 싶어요'},
          {label:'둘 다',value:'기존 시술 관리도 하고 새로운 고민도 상담받고 싶어요'}
        ],false);
      });
    } else {
      // First visit -> show concern chips
      cgStage=1;
      cgCallAI(value,function(){
        cgShowConcernButtons();
      });
    }
  }
  else if(cgStage===0.5){
    // Stage 0.5: revisit purpose selected
    if(value.indexOf('유지')>=0&&value.indexOf('새로운')<0&&value.indexOf('둘')<0){
      // Maintenance only -> ask what treatment they got
      cgStage=0.6;
      cgCallAI(value,function(){
        cgAddSys('이전에 어떤 시술을 받으셨는지 간단히 알려주시면, 상담 준비에 도움이 돼요.');
        // Free text input
      });
    } else {
      // New concern or both -> show concern chips
      cgStage=1;
      cgCallAI(value,function(){
        cgShowConcernButtons();
      });
    }
  }
  else if(cgStage===0.6){
    // Stage 0.6: revisit - previous treatment entered (free text), ask satisfaction
    cgStage=0.7;
    cgCallAI(value,function(){
      cgAddSys('시술을 받고 불편한 건 없으셨나요? 효과는 어떠셨어요?');
      cgShowButtons('cgSatisfaction',[
        {label:'만족스러웠어요',value:'만족스러웠어요'},
        {label:'보통이었어요',value:'보통이었어요'},
        {label:'기대에 못 미쳤어요',value:'기대보다 효과가 부족했어요'},
        {label:'불편한 점이 있었어요',value:'불편한 점이 있었어요'}
      ],false);
    });
  }
  else if(cgStage===0.7){
    // Stage 0.7: satisfaction answered -> ask additional notes then wrap up
    cgStage=5;
    cgCallAI(value,function(){
      cgAddSys('상담 전에 혹시 더 궁금하신 점이나, 상담실장님께 꼭 전해드리고 싶은 게 있으세요?');
      cgShowButtons('cgExtra',[
        {label:'아니요, 괜찮아요',value:'특별히 없어요'},
      ],false);
    });
  }
  else if(cgStage===1){
    // Stage 1 -> 2: concerns selected, show sub-concerns
    cgStage=2;
    cgSelectedConcerns=value.split(', ');
    var primary=cgSelectedConcerns[0];
    var subs=CG_SUB_CONCERNS[primary]||[];
    if(subs.length>0){
      cgCallAI(value,function(){
        cgAddSys('더 구체적으로 어떤 부분이 신경 쓰이세요?');
        cgShowButtons('cgSub',subs.map(function(s){return{label:s,value:s}}),true);
      });
    } else {
      cgStage=3;
      cgCallAI(value,function(){cgShowExpButtons();});
    }
  }
  else if(cgStage===2){
    // Stage 2 -> 3: sub-concern selected, show experience yes/no
    cgStage=3;
    cgCallAI(value,function(){cgShowExpButtons();});
  }
  else if(cgStage===3){
    // Stage 3 -> 4: experience answered, show priority chips
    cgStage=4;
    cgCallAI(value,function(){
      cgAddSys('시술을 고르실 때 가장 중요하게 생각하시는 게 있으세요? (최대 2개)');
      cgShowButtons('cgPriority',[
        {label:'확실한 효과',value:'확실한 효과'},{label:'오래 유지되는 것',value:'오래 유지되는 것'},
        {label:'가격 대비 만족도',value:'가격 대비 만족도'},{label:'자연스러운 결과',value:'자연스러운 결과'},
        {label:'통증이 적은 것',value:'통증이 적은 것'}
      ],true);
    });
  }
  else if(cgStage===4){
    // Stage 4 -> 5: priorities selected, ask additional notes
    cgStage=5;
    cgCallAI(value,function(){
      cgAddSys('상담 전에 혹시 더 궁금하신 점이나, 상담실장님께 꼭 전해드리고 싶은 게 있으세요?');
      cgShowButtons('cgExtra',[
        {label:'아니요, 괜찮아요',value:'특별히 없어요'},
      ],false);
      // 자유 입력도 가능
    });
  }
  else if(cgStage===5){
    // Stage 5 -> 6: wrap up
    cgStage=6;
    cgCallAI(value,function(data){
      if(data&&data.profile) cgShowProfile(data.profile);
    });
  }
}

// --- AI call (background, with callback for next buttons) ---
function cgCallAI(userText,callback){
  cgShowLoading();
  var apiMessages=cgMessages.filter(function(m){return m.role==='user'||m.role==='assistant'});
  fetch(CG_ENDPOINT,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({messages:apiMessages,session_id:cgSessionId})
  })
  .then(function(r){return r.json()})
  .then(function(data){
    cgHideLoading();
    if(data.reply) cgAddSys(data.reply);
    cgLogMessage('system',data.reply||'');
    if(callback) callback(data);
  })
  .catch(function(){
    cgHideLoading();
    document.getElementById('cgOffline').style.display='block';
    cgAddSys('죄송합니다. 잠시 연결이 원활하지 않습니다.');
    if(callback) callback(null);
  });
}

// --- Free text input (for stage 5 additional notes) ---
function cgSend(){
  var input=document.getElementById('cgInput');
  var text=input.value.trim();
  if(!text)return;
  input.value='';
  // Remove any remaining chips
  var chips=document.querySelectorAll('#cgMessages .cg-chips');
  chips.forEach(function(c){c.remove()});
  cgOnSelect(text);
}

function cgShowProfile(profile){
  var container=document.getElementById('cgMessages');
  var card=document.createElement('div');
  card.className='cg-profile-card';
  var h='<div class="cg-profile-header">상담 준비 완료</div>';
  h+='<div class="cg-profile-row"><span class="cg-profile-label">방문 유형</span><span class="cg-profile-value">'+profile.visit_type+'</span></div>';
  if(profile.primary_concern){
    h+='<div class="cg-profile-row"><span class="cg-profile-label">주요 고민</span><span class="cg-profile-value">'+profile.primary_concern.area+' - '+profile.primary_concern.detail+'</span></div>';
  }
  if(profile.secondary_concerns&&profile.secondary_concerns.length>0){
    var secs=profile.secondary_concerns.map(function(s){return s.area}).join(', ');
    h+='<div class="cg-profile-row"><span class="cg-profile-label">추가 고민</span><span class="cg-profile-value">'+secs+'</span></div>';
  }
  if(profile.priorities&&profile.priorities.length>0){
    h+='<div class="cg-profile-row"><span class="cg-profile-label">우선순위</span><span class="cg-profile-value">'+profile.priorities.join(', ')+'</span></div>';
  }
  if(profile.conversation_tone_memo){
    h+='<div class="cg-profile-row"><span class="cg-profile-label">메모</span><span class="cg-profile-value">'+profile.conversation_tone_memo+'</span></div>';
  }
  card.innerHTML=h;
  container.appendChild(card);
  container.scrollTop=container.scrollHeight;
  // Log profile to DB
  cgLogProfile(profile);
}
